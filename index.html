<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Interactive Me</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <!-- Desktop instructions -->
    <div id="overlay">
      <div id="instructions">Right-drag orbit | WASD move | Scroll zoom | Tab mode | G interact | V front | Z prone | Space jump | Shift sprint | E emotes | Enter chat | Esc menu</div>
    </div>

    <!-- Emote panel (E key or button) -->
    <div id="emote-panel" class="hidden">
      <div id="emote-grid"></div>
    </div>

    <!-- Chat -->
    <div id="chat-area">
      <div id="chat-log"></div>
      <input id="chat-input" type="text" placeholder="/dance /sleep /yell hello..." autocomplete="off" />
    </div>

    <!-- Mobile: joystick left side -->
    <div id="mobile-controls">
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-thumb"></div>
        </div>
      </div>
    </div>

    <!-- Mobile: action bar right side (above chat) -->
    <div id="mobile-bar">
      <button class="bar-btn" id="btn-jump">JUMP</button>
      <button class="bar-btn" id="btn-sprint">RUN</button>
      <button class="bar-btn" id="btn-camera">CAM</button>
      <button class="bar-btn" id="btn-emote-mobile">EMO</button>
      <button class="bar-btn" id="btn-chat-mobile">CHAT</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
