<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Interactive Me</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div id="instructions">Right-drag orbit | WASD move | Scroll zoom | V front cam | Z prone | Space jump | Shift sprint | Ctrl crouch | E emotes | Enter chat</div>
    </div>

    <!-- Emote menu (toggle with E or click button) -->
    <div id="emote-panel" class="hidden">
      <div id="emote-grid"></div>
    </div>
    <button id="emote-toggle">&#x1F60E;</button>

    <!-- Chat input -->
    <div id="chat-area">
      <div id="chat-log"></div>
      <input id="chat-input" type="text" placeholder="Enter to chat... /dance /sleep /box /backflip..." autocomplete="off" />
    </div>

    <!-- Mobile touch controls -->
    <div id="mobile-controls">
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-thumb"></div>
        </div>
      </div>
      <div id="action-buttons">
        <button class="action-btn" id="btn-camera">CAM</button>
        <div id="btn-row">
          <button class="action-btn" id="btn-jump">JUMP</button>
          <button class="action-btn" id="btn-sprint">RUN</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
